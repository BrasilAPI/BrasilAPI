name: Deploy to Production

on:
  push:
    branches:
      - producao

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/brasilapi

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint code
        run: npm run lint
      
      - name: Run tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,prefix=prod-
            latest
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ENVIRONMENT=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://api.brasilapi.com.br
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Production Server 1
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_SERVER_1_HOST }}
          username: ${{ secrets.PROD_SERVER_1_USER }}
          key: ${{ secrets.PROD_SERVER_1_SSH_KEY }}
          port: ${{ secrets.PROD_SERVER_1_PORT }}
          script: |
            set -e
            cd /app/brasilapi
            git fetch origin
            git checkout producao
            git pull origin producao
            docker-compose -f docker-compose.yml pull app-prod-1
            docker-compose -f docker-compose.yml up -d app-prod-1
            docker-compose -f docker-compose.yml exec -T app-prod-1 npm run migrate || true
            sleep 10
            docker-compose -f docker-compose.yml up -d nginx
            echo "Production Server 1 deployment completed successfully!"
      
      - name: Deploy to Production Server 2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_SERVER_2_HOST }}
          username: ${{ secrets.PROD_SERVER_2_USER }}
          key: ${{ secrets.PROD_SERVER_2_SSH_KEY }}
          port: ${{ secrets.PROD_SERVER_2_PORT }}
          script: |
            set -e
            cd /app/brasilapi
            git fetch origin
            git checkout producao
            git pull origin producao
            docker-compose -f docker-compose.yml pull app-prod-2
            docker-compose -f docker-compose.yml up -d app-prod-2
            docker-compose -f docker-compose.yml exec -T app-prod-2 npm run migrate || true
            sleep 10
            docker-compose -f docker-compose.yml up -d nginx
            echo "Production Server 2 deployment completed successfully!"
      
      - name: Health Check Prod 1
        run: |
          for i in {1..30}; do
            if curl -f https://${{ secrets.PROD_SERVER_1_HOST }}/health; then
              echo "Health check passed for Prod 1"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed for Prod 1"
          exit 1
      
      - name: Health Check Prod 2
        run: |
          for i in {1..30}; do
            if curl -f https://${{ secrets.PROD_SERVER_2_HOST }}/health; then
              echo "Health check passed for Prod 2"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed for Prod 2"
          exit 1
      
      - name: Rollback on Failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_SERVER_1_HOST }}
          username: ${{ secrets.PROD_SERVER_1_USER }}
          key: ${{ secrets.PROD_SERVER_1_SSH_KEY }}
          port: ${{ secrets.PROD_SERVER_1_PORT }}
          script: |
            cd /app/brasilapi
            docker-compose -f docker-compose.yml up -d app-prod-1
            echo "Rollback completed on Prod 1"
      
      - name: Notify Slack on Success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '✅ Production deployment successful (2 servers)'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author
      
      - name: Notify Slack on Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '❌ Production deployment failed - Rollback initiated'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author
